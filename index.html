<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1パチ計算機 Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 16px; max-width: 450px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; font-size: 1.2rem; color: #1a73e8; }
        
        .config-section { background: #fff4e6; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ffe8cc; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #5f6368; }
        input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 18px; margin-bottom: 12px; }
        input:focus { border-color: #1a73e8; outline: none; background: #fff; }

        .results-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .result-box { padding: 15px; background: #1a73e8; color: white; border-radius: 12px; text-align: center; }
        .result-box.sub { background: #34a853; }
        .label-text { font-size: 11px; opacity: 0.9; margin-bottom: 5px; }
        .val { font-size: 1.5rem; font-weight: bold; display: block; }

        .btn-reset { width: 100%; padding: 10px; background: #f1f3f4; border: none; border-radius: 8px; color: #5f6368; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>1パチ ボーダー計算</h2>

    <div class="config-section">
        <label>⚙️ 1,000円あたりの貸玉数 (個)</label>
        <input type="number" id="balls_per_1000" value="1000">
    </div>
    
    <label>① 現金投資額 (円)</label>
    <input type="number" id="cash_inv" value="0" step="200" onClick="this.select();">

    <label>② 使用した持ち玉 (個)</label>
    <input type="number" id="ball_inv" value="0" step="100" onClick="this.select();">

    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <label>現在の回転数 (データ機)</label>
    <input type="number" id="total_rotations" placeholder="0" onClick="this.select();">

    <label>打ち始めの回転数</label>
    <input type="number" id="start_rotations" value="0" onClick="this.select();">

    <div class="results-container">
        <div class="result-box">
            <div class="label-text">1,000円あたり</div>
            <span id="rate_1000" class="val">0.0</span>
        </div>
        <div class="result-box sub">
            <div class="label-text">250円あたり</div>
            <span id="rate_250" class="val">0.0</span>
        </div>
    </div>

    <button class="btn-reset" onclick="resetForm()">数値をリセット</button>

    <div style="text-align: center; font-size: 11px; color: #999; margin-top: 15px;">
        総消費: <span id="total_balls_text">0</span> 玉相当
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('input', calculate);
    });

    function calculate() {
        const ballsPer1000 = parseFloat(document.getElementById('balls_per_1000').value) || 1000;
        const cash = parseFloat(document.getElementById('cash_inv').value) || 0;
        const ballInv = parseFloat(document.getElementById('ball_inv').value) || 0;
        const totalRot = parseFloat(document.getElementById('total_rotations').value) || 0;
        const startRot = parseFloat(document.getElementById('start_rotations').value) || 0;

        // 現金を玉数に換算
        const cashToBalls = (cash / 1000) * ballsPer1000;
        const totalBallsUsed = cashToBalls + ballInv;
        const diffRot = totalRot - startRot;

        if (totalBallsUsed > 0 && diffRot >= 0) {
            // 1000円（貸玉数分）あたりの回転率
            const rate1000 = (diffRot / totalBallsUsed) * ballsPer1000;
            // 250円（貸玉数/4）あたりの回転率
            const rate250 = (diffRot / totalBallsUsed) * (ballsPer1000 / 4);
            
            document.getElementById('rate_1000').innerText = rate1000.toFixed(1);
            document.getElementById('rate_250').innerText = rate250.toFixed(1);
            document.getElementById('total_balls_text').innerText = Math.round(totalBallsUsed).toLocaleString();
        } else {
            document.getElementById('rate_1000').innerText = "0.0";
            document.getElementById('rate_250').innerText = "0.0";
            document.getElementById('total_balls_text').innerText = "0";
        }
    }

    function resetForm() {
        document.getElementById('cash_inv').value = 0;
        document.getElementById('ball_inv').value = 0;
        document.getElementById('total_rotations').value = "";
        document.getElementById('start_rotations').value = 0;
        calculate();
    }
</script>

</body>
</html>
